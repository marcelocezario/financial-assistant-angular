<div class="icon-entry" *ngIf="credit != null">
  <button mat-mini-fab *ngIf="credit" class="icon-credit">
    <mat-icon>trending_up</mat-icon>
  </button>
  <button mat-mini-fab *ngIf="!credit" class="icon-debit">
    <mat-icon>trending_down</mat-icon>
  </button>
</div>
<div class="line">
  <div class="line-right"></div>
  <div class="line-left"></div>
</div>
