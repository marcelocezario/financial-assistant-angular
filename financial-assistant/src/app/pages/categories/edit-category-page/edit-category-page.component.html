<section class="default-container">
  <app-section-title>
    <span *ngIf="editCategory">Editar</span>
    <span *ngIf="!editCategory">Nova</span>
    Categoria</app-section-title
  >

  <form class="form-container">
    <mat-form-field appearance="fill">
      <mat-label>Nome</mat-label>
      <input
        matInput
        type="text"
        placeholder="Digite um nome para a categoria"
        name="category-name"
        [(ngModel)]="category.name"
      />
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Valor do orçamento</mat-label>
      <input
        matInput
        type="number"
        placeholder="Digite um valor de orçamento"
        name="category-budget"
        [(ngModel)]="category.budget"
      />
    </mat-form-field>

    <mat-label>Escolha um ícone</mat-label>
    <mat-button-toggle-group>
      <mat-button-toggle
        *ngFor="let icon of moreUsedCategoryIcons"
        value="{{ icon.name }}"
        class="choice-icons"
        checked="{{ icon.name == category.icon }}"
        (click)="selectIcon(icon.name)"
        ><mat-icon>{{ icon.name }}</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>

    <br />

    <mat-form-field appearance="outline">
      <mat-label>Procure mais ícones</mat-label>
      <input
        matInput
        placeholder="Digite algo"
        name="find_icon"
        [(ngModel)]="findIcon"
        (keyup)="filterIcons()"
      />
      <mat-icon matSuffix (click)="filterIcons()">search</mat-icon>
      <mat-hint
        >Digite <strong>todos</strong> para exibir todos os ícones</mat-hint
      >
    </mat-form-field>

    <mat-button-toggle-group>
      <mat-button-toggle
        *ngFor="let icon of filteredCategoryIcons"
        value="{{ icon.name }}"
        class="choice-icons"
        checked="{{ icon.name == category.icon }}"
        (click)="selectIcon(icon.name)"
        ><mat-icon>{{ icon.name }}</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>

    <app-float-button [matIcon]="'save'" (actionButton)="save()"></app-float-button>
  </form>
</section>
